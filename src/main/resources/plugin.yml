name: CreatureCapture
main: me.crylonz.CreatureCapture
version: "${version}"
author: Crylonz
description: Capture monster !
api-version: "1.13"
commands:
  cc:
    description: is the base command for CreatureCapture plugin.
    usage: /cc <get|reload|collection|stats|remaining|top>
    #permission: creaturecapture.cc

permissions:
  creaturecapture.capture:
    description: Allows you to capture creature
    default: op
  creaturecapture.cc:
    description: Allows you to use creature capture commands
    default: op
  creaturecapture.get:
    description: Allows you to give you capture bow
    default: op
  creaturecapture.reload:
    description: Allows you to reload settings.
    default: op
  creaturecapture.collection:
    description: Allows you to view your creature collection.
    default: true
  creaturecapture.stats:
    description: Allows you to view your creature stats.
    default: true
  creaturecapture.remaining:
    description: Allows you to view the creatures you still need to capture.
    default: true
  creaturecapture.top:
    description: Allows you to view the creature leaderboard.
    default: true
